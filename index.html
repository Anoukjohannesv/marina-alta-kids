<div id="app">

    <div>

        <button class="lang-btn" data-lang="nl" onclick="setLang('nl')">🇳🇱 NL</button>
        <button class="lang-btn" data-lang="de" onclick="setLang('de')">🇩🇪 DE</button>
      </div>
    </div>
  </header>

  <div class="filters">
    <span class="filter-label" id="fl-cat"></span>
    <button class="filter-btn all" data-cat="all" id="fb-all" onclick="filterCat('all')"></button>
    <button class="filter-btn waterpark" data-cat="waterpark" id="fb-waterpark" onclick="filterCat('waterpark')"></button>
    <button class="filter-btn dieren" data-cat="dieren" id="fb-dieren" onclick="filterCat('dieren')"></button>
    <button class="filter-btn natuur" data-cat="natuur" id="fb-natuur" onclick="filterCat('natuur')"></button>
    <button class="filter-btn cultuur" data-cat="cultuur" id="fb-cultuur" onclick="filterCat('cultuur')"></button>
    <button class="filter-btn avontuur" data-cat="avontuur" id="fb-avontuur" onclick="filterCat('avontuur')"></button>
    <button class="filter-btn strand" data-cat="strand" id="fb-strand" onclick="filterCat('strand')"></button>
    <div class="filter-separator"></div>
    <span class="filter-label" id="fl-reg"></span>
    <button class="filter-btn cb" data-reg="cb" id="fb-cb" onclick="filterReg('cb')"></button>
    <button class="filter-btn denia" data-reg="denia" id="fb-denia" onclick="filterReg('denia')"></button>
    <button class="filter-btn javea" data-reg="javea" id="fb-javea" onclick="filterReg('javea')"></button>
    <button class="filter-btn valencia" data-reg="valencia" id="fb-valencia" onclick="filterReg('valencia')"></button>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="route-panel">
        <div class="rp-title"><span id="rp-title-label"></span> <span class="rp-count" id="rp-count">0</span></div>
        <div class="origin-section">
          <button class="origin-btn" id="loc-btn" onclick="getMyLocation()"></button>
          <span class="origin-status" id="loc-status" style="display:none"></span>
        </div>
        <div class="mode-select">
          <div class="mode-btn active" data-mode="driving" id="mode-driving" onclick="selectMode('driving')"></div>
          <div class="mode-btn" data-mode="walking" id="mode-walking" onclick="selectMode('walking')"></div>
          <div class="mode-btn" data-mode="bicycling" id="mode-bicycling" onclick="selectMode('bicycling')"></div>
        </div>
        <div class="stop-list" id="stop-list">
          <div class="rp-empty" id="rp-empty"></div>
        </div>
        <div class="rp-actions">
          <a class="rp-open-btn disabled" id="open-gm-link" href="#" target="_blank" rel="noopener noreferrer">
            <img src="https://www.gstatic.com/images/branding/product/1x/maps_48dp.png" style="width:18px;height:18px;border-radius:4px" alt=""/>
            <span id="gm-btn-text"></span>
          </a>
          <button class="rp-clear-btn" onclick="clearRoute()">🗑️</button>
        </div>
      </div>
      <div class="sidebar-title" id="sidebar-title-el">
        📍 <span id="sidebar-title-label"></span> <span class="sidebar-count" id="list-count"></span>
      </div>
      <div class="sidebar-list" id="sidebar-list"></div>
    </div>
    <div id="map"></div>
  </div>
</div>

   age:"Alle",price:"Gratis",tags:{nl:["Stadsstrand","Promenade","Restaurants"],en:["City beach","Promenade","Restaurants"],de:["Stadtstrand","Promenade","Restaurants"]},url:"https://www.visitvalencia.com/"}
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = localStorage.getItem('mak-lang') || 'en';
let markers = [];
let map;
let activeCat = "all";
let activeReg = null;
let routeStops = [];
let travelMode = "driving";
let myLat = null, myLng = null;
let locationFound = false;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function L_(key) { return t[lang][key] || key; }
function getCatName(c) { return {waterpark:L_("cat_waterpark"),dieren:L_("cat_dieren"),natuur:L_("cat_natuur"),cultuur:L_("cat_cultuur"),avontuur:L_("cat_avontuur"),strand:L_("cat_strand")}[c]; }
function getRegionName(r) { return {cb:L_("reg_cb"),denia:L_("reg_denia"),javea:L_("reg_javea"),valencia:L_("reg_valencia")}[r]; }
function getRegionIcon(r) { return {cb:"🏔️",denia:"⛵",javea:"🌊",valencia:"🏙️"}[r]; }
function localizeAge(a) { return a === "Alle" ? L_("age_all") : a; }
function localizePrice(p) { return p.replace(/Gratis/g, L_("free_word")); }
function getDesc(loc) { return loc.desc[lang] || loc.desc.en; }
function getTags(loc) { return (loc.tags[lang] || loc.tags.en); }

// ── LANGUAGE ──────────────────────────────────────────────────────────────────
function setLang(newLang) {
  lang = newLang;
  localStorage.setItem('mak-lang', lang);
  document.documentElement.lang = lang;
  document.title = L_("page_title");

  document.getElementById('hdr-title').textContent = L_("h1");
  document.getElementById('hdr-subtitle').textContent = L_("subtitle");
  document.getElementById('badge-region').textContent = L_("badge_region");
  document.getElementById('badge-count').textContent = `${locations.length} ${L_("locations_label")}`;

  document.getElementById('fl-cat').textContent = L_("fl_cat");
  document.getElementById('fl-reg').textContent = L_("fl_reg");
  document.getElementById('fb-all').textContent = L_("fb_all");
  document.getElementById('fb-waterpark').textContent = L_("fb_waterpark");
  document.getElementById('fb-dieren').textContent = L_("fb_dieren");
  document.getElementById('fb-natuur').textContent = L_("fb_natuur");
  document.getElementById('fb-cultuur').textContent = L_("fb_cultuur");
  document.getElementById('fb-avontuur').textContent = L_("fb_avontuur");
  document.getElementById('fb-strand').textContent = L_("fb_strand");
  document.getElementById('fb-cb').textContent = L_("fb_cb");
  document.getElementById('fb-denia').textContent = L_("fb_denia");
  document.getElementById('fb-javea').textContent = L_("fb_javea");
  document.getElementById('fb-valencia').textContent = L_("fb_valencia");

  document.getElementById('rp-title-label').textContent = L_("rp_title");
  document.getElementById('mode-driving').textContent = L_("mode_driving");
  document.getElementById('mode-walking').textContent = L_("mode_walking");
  document.getElementById('mode-bicycling').textContent = L_("mode_bicycling");
  document.getElementById('gm-btn-text').textContent = L_("open_gm");
  document.getElementById('sidebar-title-label').textContent = L_("sidebar_label");

  // Update loc button state
  const locBtn = document.getElementById('loc-btn');
  if (locationFound) {
    locBtn.textContent = L_("loc_active");
    document.getElementById('loc-status').textContent = L_("loc_found");
  } else {
    locBtn.textContent = L_("loc_btn");
  }

  // Active lang button
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));

  renderMarkers();
  renderSidebar();
  refreshRoutePanel();
}

// ── MAP & MARKERS ─────────────────────────────────────────────────────────────
function init() {
  map = L.map("map", {scrollWheelZoom:true}).setView([38.9,-0.2], 8);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {attribution:"© OpenStreetMap"}).addTo(map);
  setLang(lang);
}

function getFiltered() {
  return locations.filter(loc => {
    if (activeCat !== "all" && loc.cat !== activeCat) return false;
    if (activeReg && loc.reg !== activeReg) return false;
    return true;
  });
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  getFiltered().forEach(loc => {
    const color = catColors[loc.cat];
    const inRoute = routeStops.includes(loc.id);
    const border = inRoute ? ";border-color:#27ae60;border-width:3px" : "";
    const markerHtml = `<div style="background:${color};width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center${border}"><span style="transform:rotate(45deg);font-size:.9rem">${loc.emoji}</span></div>`;
    const icon = L.divIcon({className:"",html:markerHtml,iconSize:[30,30],iconAnchor:[15,30]});
    const m = L.marker([loc.lat,loc.lng],{icon}).addTo(map);
    const gmUrl = buildGMapsUrl(loc.lat, loc.lng);
    const tags = getTags(loc).map(tag => `<span class="popup-tag">${tag}</span>`).join("");
    const popupHtml = `
      <div class="popup-header" style="background:${color}">
        <h3>${loc.emoji} ${loc.name}</h3>
        <p>📍 ${loc.city} <span class="popup-region" style="background:${regColors[loc.reg]}">${getRegionName(loc.reg)}</span></p>
      </div>
      <div class="popup-body">
        ${getDesc(loc)}
        <div class="popup-meta"><span>👶 ${localizeAge(loc.age)}</span><span>💶 ${localizePrice(loc.price)}</span></div>
        <div class="popup-tags">${tags}</div>
      </div>
      <div class="popup-btns">
        <a class="popup-btn-nav" href="${gmUrl}" target="_blank" rel="noopener noreferrer">${L_("popup_route")}</a>
        <button class="popup-btn-add${inRoute?" added":""}" id="pop-add-${loc.id}" onclick="toggleRoute(${loc.id})">${inRoute ? L_("popup_added") : L_("popup_add")}</button>
        <a class="popup-btn-info" href="${loc.url}" target="_blank" rel="noopener noreferrer">🔗</a>
      </div>`;
    m.bindPopup(popupHtml, {maxWidth:300});
    markers.push(m);
  });
}

function buildGMapsUrl(lat, lng) {
  const origin = (myLat && myLng) ? `&origin=${myLat},${myLng}` : "";
  return `https://www.google.com/maps/dir/?api=1${origin}&destination=${lat},${lng}&travelmode=${travelMode}`;
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const filtered = getFiltered();
  document.getElementById('list-count').textContent = `${filtered.length} ${L_("locations_label")}`;
  const byReg = {cb:[],denia:[],javea:[],valencia:[]};
  filtered.forEach(loc => byReg[loc.reg].push(loc));
  let html = "";
  ["cb","denia","javea","valencia"].forEach(r => {
    if (!byReg[r].length) return;
    html += `<div class="region-header ${r}">${getRegionIcon(r)} ${getRegionName(r)} (${byReg[r].length})</div>`;
    byReg[r].forEach(loc => {
      const inR = routeStops.includes(loc.id);
      html += `<div class="sidebar-item${inR?" in-route":""}" onclick="focusMarker(${loc.id})">
        <div class="sidebar-item-icon">${loc.emoji}</div>
        <div class="sidebar-item-info">
          <h4>${loc.name}</h4>
          <p>📍 ${loc.city} | 💶 ${localizePrice(loc.price)}</p>
          <span class="sidebar-item-badge" style="background:${catColors[loc.cat]}">${getCatName(loc.cat)}</span>
        </div>
        <button class="sidebar-item-add${inR?" added":""}" onclick="event.stopPropagation();toggleRoute(${loc.id})">${inR?"✓":"+"}</button>
      </div>`;
    });
  });
  document.getElementById('sidebar-list').innerHTML = html;
}

// ── ROUTE PANEL ───────────────────────────────────────────────────────────────
function refreshRoutePanel() {
  const sl = document.getElementById("stop-list");
  const empty = document.getElementById("rp-empty");
  const cnt = document.getElementById("rp-count");
  const link = document.getElementById("open-gm-link");

  empty.innerHTML = L_("rp_empty");
  cnt.textContent = routeStops.length;

  if (routeStops.length === 0) {
    sl.innerHTML = "";
    sl.appendChild(empty);
    link.classList.add("disabled");
    link.href = "#";
    return;
  }

  const stops = routeStops.map(id => locations.find(l => l.id === id));
  let url;
  if (stops.length === 1) {
    const s = stops[0];
    const origin = (myLat && myLng) ? `&origin=${myLat},${myLng}` : "";
    url = `https://www.google.com/maps/dir/?api=1${origin}&destination=${s.lat},${s.lng}&travelmode=${travelMode}`;
  } else {
    const originPt = (myLat && myLng) ? `${myLat},${myLng}` : `${stops[0].lat},${stops[0].lng}`;
    const dest = `${stops[stops.length-1].lat},${stops[stops.length-1].lng}`;
    const wp = stops.length > 2 ? stops.slice(1,-1).map(s=>`${s.lat},${s.lng}`).join("|") : "";
    url = `https://www.google.com/maps/dir/?api=1&origin=${originPt}&destination=${dest}&travelmode=${travelMode}`;
    if (wp) url += `&waypoints=${wp}`;
  }

  link.classList.remove("disabled");
  link.href = url;
  if (empty.parentNode === sl) sl.removeChild(empty);
  sl.innerHTML = stops.map((loc,i) => `<div class="stop-item">
    <div class="stop-num">${i+1}</div>
    <div style="flex:1;min-width:0"><div class="stop-name">${loc.emoji} ${loc.name}</div><div class="stop-city">📍 ${loc.city}</div></div>
    <button class="stop-del" onclick="removeStop(${loc.id})">✕</button>
  </div>`).join("");
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function filterCat(cat) {
  activeCat = cat;
  document.querySelectorAll(".filter-btn[data-cat]").forEach(b => b.classList.remove("active"));
  if (cat !== "all") document.querySelector(`.filter-btn[data-cat="${cat}"]`).classList.add("active");
  renderMarkers(); renderSidebar();
}

function filterReg(reg) {
  if (activeReg === reg) {
    activeReg = null;
    document.querySelector(`.filter-btn[data-reg="${reg}"]`).classList.remove("active");
  } else {
    document.querySelectorAll(".filter-btn[data-reg]").forEach(b => b.classList.remove("active"));
    activeReg = reg;
    document.querySelector(`.filter-btn[data-reg="${reg}"]`).classList.add("active");
  }
  renderMarkers(); renderSidebar();
}

// ── ROUTE ACTIONS ─────────────────────────────────────────────────────────────
function focusMarker(id) {
  const loc = locations.find(l => l.id === id);
  map.setView([loc.lat, loc.lng], 12, {animate:true});
  const m = markers.find(mk => { const ll = mk.getLatLng(); return ll.lat === loc.lat && ll.lng === loc.lng; });
  if (m) m.openPopup();
}

function toggleRoute(id) {
  const idx = routeStops.indexOf(id);
  if (idx > -1) { routeStops.splice(idx, 1); showToast(L_("toast_removed")); }
  else {
    if (routeStops.length >= 9) { showToast(L_("toast_max")); return; }
    routeStops.push(id); showToast(L_("toast_added"));
  }
  refreshRoutePanel(); renderMarkers(); renderSidebar();
}

function removeStop(id) {
  routeStops = routeStops.filter(s => s !== id);
  refreshRoutePanel(); renderMarkers(); renderSidebar();
}

function clearRoute() {
  if (!routeStops.length) return;
  if (confirm(L_("confirm_clear"))) {
    routeStops = [];
    refreshRoutePanel(); renderMarkers(); renderSidebar();
    showToast(L_("toast_cleared"));
  }
}

function selectMode(mode) {
  travelMode = mode;
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
  document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add("active");
  refreshRoutePanel(); renderMarkers();
}

// ── GEOLOCATION ───────────────────────────────────────────────────────────────
function getMyLocation() {
  const btn = document.getElementById("loc-btn");
  btn.textContent = L_("loc_searching");
  btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    pos => {
      myLat = pos.coords.latitude.toFixed(6);
      myLng = pos.coords.longitude.toFixed(6);
      locationFound = true;
      btn.textContent = L_("loc_active");
      btn.classList.add("active");
      btn.disabled = false;
      document.getElementById("loc-status").textContent = L_("loc_found");
      document.getElementById("loc-status").style.display = "inline";
      showToast(L_("toast_loc"));
      L.marker([myLat,myLng], {
        icon: L.divIcon({className:"",html:`<div style="background:#27ae60;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>`,iconSize:[18,18],iconAnchor:[9,9]})
      }).addTo(map).bindPopup(L_("my_location")).openPopup();
      map.setView([myLat, myLng], 10, {animate:true});
      refreshRoutePanel(); renderMarkers();
    },
    () => {
      btn.textContent = L_("loc_btn");
      btn.disabled = false;
      showToast(L_("toast_loc_err"));
    }
  );
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

init();
</script>
